helmDefaults:
  wait: true
  timeout: 600
  createNamespace: false

environments:
  dev:
    values:
      - ./env/dev/values.yaml
      - ./env/dev/proxy.values.yaml
      - ./env/dev/resources.yaml
    secrets:
      - ./env/dev/secrets.sops.yaml
  prod:
    values:
      - ./env/prod/values.yaml
      - ./env/prod/resources.yaml
    secrets:
      - ./env/prod/secrets.sops.yaml

repositories:
  # blank chart to create namespaces and other raw k8s resources
  - name: raw
    url: https://bedag.github.io/helm-charts/

  # todo: find chart notes
  - name: jetstack
    url: https://charts.jetstack.io

  # todo: find chart notes
  - name: traefik
    url: https://traefik.github.io/charts

  # todo: find chart notes
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts

  # todo: find chart notes
  - name: ory
    url: https://k8s.ory.sh/helm/charts

  # https://opentelemetry.io/docs/platforms/kubernetes/helm/
  - name: open-telemetry
    url: https://open-telemetry.github.io/opentelemetry-helm-charts

  # ez prometheus & grafana: https://github.com/prometheus-operator/kube-prometheus
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

  # https://github.com/cloudnative-pg/grafana-dashboards
  - name: cnpg-grafana
    url: https://cloudnative-pg.github.io/grafana-dashboards
  # https://artifacthub.io/packages/helm/runix/pgadmin4
  - name: runix
    url: https://helm.runix.net

  # tempo: https://github.com/grafana/tempo/tree/main/example/helm
  # loki: https://grafana.com/docs/loki/latest/setup/install/helm/install-scalable/
  # https://github.com/grafana/loki/tree/main/production/helm/loki
  - name: grafana
    url: https://grafana.github.io/helm-charts


---

releases:


  #  ensure all namespaces exist before any releases run
  - name: create-namespaces
    namespace: kube-system
    chart: raw/raw
    version: 2.0.2
    values:
      - resources:
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: networking
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: cert-manager
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: monitoring
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: database
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: tools
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: ory
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: application




  - name: kube-prometheus-stack
    namespace: monitoring
    labels:
      app: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: "~65.0.0"
    secrets:
      - ./env/{{ .Environment.Name }}/secrets.sops.yaml
    values:
      - ./values/kube-prometheus-stack.yaml.gotmpl


  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: "~1.19.0"
    set:
      - name: crds.enabled
        value: true
    values:
      - ./values/cert-manager.yaml.gotmpl


  - name: certificates
    namespace: cert-manager
    chart: ./charts/certificates
    needs:
      - cert-manager/cert-manager
    secrets:
      - ./env/{{ .Environment.Name }}/secrets.sops.yaml
    values:
      - ./env/{{ .Environment.Name }}/values.yaml
      - ./charts/certificates/values.yaml

  - name: traefik
    namespace: networking
    chart: traefik/traefik
    version: "~37.4.0"
    needs:
      - cert-manager/certificates
    values:
      - ./values/traefik.yaml.gotmpl

  - name: traefik-routes
    namespace: networking
    chart: ./charts/traefik
    needs:
      - networking/traefik
    values:
      - ./env/{{ .Environment.Name }}/values.yaml
      - ./env/{{ .Environment.Name }}/proxy.values.yaml
    secrets:
      - ./env/{{ .Environment.Name }}/secrets.sops.yaml

  - name: tempo
    namespace: monitoring
    chart: grafana/tempo
    version: "1.18.0"
    values:
      - ./values/tempo.yaml.gotmpl

  - name: loki
    namespace: monitoring
    chart: grafana/loki
    version: "~6.0.0"
    values:
      - ./values/loki.yaml.gotmpl

  - name: promtail
    namespace: monitoring
    chart: grafana/promtail
    version: "~6.15.0"
    needs:
      - monitoring/loki
    values:
      - ./values/promtail.yaml.gotmpl

  - name: otel-collector
    namespace: monitoring
    chart: open-telemetry/opentelemetry-collector
    version: "~0.77.0"
    values:
      - ./values/otel-collector.yaml.gotmpl

  - name: cnpg-grafana
    namespace: monitoring
    chart: cnpg-grafana/cluster
    version: "0.0.5"

  - name: grafana-dashboards
    namespace: monitoring
    chart: ./charts/grafana-dashboards
    needs:
      - monitoring/kube-prometheus-stack
    values:
      - ./values/grafana-dashboards.yaml.gotmpl

  - name: cnpg-operator
    namespace: database
    chart: cnpg/cloudnative-pg
    version: "~0.26.1"
    set:
      - name: crds.create
        value: true
    values:
      - ./values/cnpg-operator.yaml.gotmpl

  - name: postgres
    namespace: database
    chart: ./charts/postgres
    needs:
      - database/cnpg-operator
    secrets:
      - ./env/{{ .Environment.Name }}/secrets.sops.yaml
    values:
      - ./env/{{ .Environment.Name }}/values.yaml
      - ./env/{{ .Environment.Name }}/proxy.values.yaml

  - name: postgres-cluster
    namespace: database
    chart: cnpg/cluster
    version: "~0.3.1"
    needs:
      - database/cnpg-operator
    secrets:
      - ./env/{{ .Environment.Name }}/secrets.sops.yaml
    values:
      - ./env/{{ .Environment.Name }}/values.yaml
      - ./values/postgres-cluster.yaml.gotmpl

  - name: mailhog
    namespace: tools
    chart: ./charts/mailhog
    needs:
      - networking/traefik-routes
    values:
      - ./values/mailhog.yaml.gotmpl

  - name: kratos
    namespace: ory
    chart: ory/kratos
    version: "~0.58.0"
    needs:
      - database/postgres-cluster
      - tools/mailhog
    secrets:
      - ./env/{{ .Environment.Name }}/secrets.sops.yaml
    values:
      - ./env/{{ .Environment.Name }}/values.yaml
      - ./values/kratos.yaml.gotmpl

  - name: kratos-admin-ui
    namespace: ory
    chart: ./charts/kratos-admin-ui
    needs:
      - networking/traefik-routes
    values:
      - ./values/kratos-admin-ui.yaml.gotmpl

  - name: application
    namespace: application
    chart: ./charts/application
    needs:
      - networking/traefik-routes
      - database/postgres-cluster
    secrets:
      - ./env/{{ .Environment.Name }}/secrets.sops.yaml
    values:
      - ./env/{{ .Environment.Name }}/values.yaml
      - ./env/{{ .Environment.Name }}/proxy.values.yaml


