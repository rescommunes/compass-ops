# HTTPRoutes for all services - centralized routing configuration.
# All routes use the wildcard certificate defined in the Gateway (dev-wildcard-tls).
# Services from external Helm charts are defined here alongside custom application routes.
# Hostnames are derived from env.subdomains and env.domain for consistency.

{{- $domain := .Values.env.domain -}}
{{- $subdomains := .Values.env.subdomains -}}

# ============================================================================
# HTTP to HTTPS Redirect (Global)
# Redirects all HTTP traffic to HTTPS for *.domain
# ============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-http-to-https
  namespace: networking
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: networking
      sectionName: web
  hostnames:
    - "{{ $domain }}"
    - "*.{{ $domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# ============================================================================
# Traefik Dashboard
# Protected by BasicAuth middleware (Traefik CRD)
# ============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik-dashboard
  namespace: networking
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: networking-dashboard-basicauth@kubernetescrd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: networking
      sectionName: websecure
  hostnames:
    - "{{ $subdomains.traefik }}.{{ $domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: traefik.io
          kind: TraefikService
          name: api@internal

