{{- if and .Values.proxy .Values.proxy.applications }}

---
# ============================================================================
# Application Routes (Dynamic)
# Namespace: application
# Created dynamically from proxy.applications values
# ============================================================================
{{- range .Values.proxy.applications }}
{{- if .exposed }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: application
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: networking
      sectionName: websecure
  hostnames:
    - "{{ .name }}.{{ $domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .name }}
          port: 80
{{- end }}
{{- end }}
{{- end }}