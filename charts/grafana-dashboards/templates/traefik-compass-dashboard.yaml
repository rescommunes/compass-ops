{{- if .Values.dashboards.traefik.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-compass-dashboard
  namespace: {{ .Values.dashboards.traefik.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  traefik-compass-dashboard.json: |
{{ .Files.Get "dashboards/traefik-compass-dashboard.json" | indent 4 }}
{{- end }}