{{- if .Values.dashboards.postgres.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-compass-dashboard
  namespace: {{ .Values.dashboards.postgres.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  postgres-compass-dashboard.json: |
{{ .Files.Get "dashboards/postgres-compass-dashboard.json" | indent 4 }}
{{- end }}