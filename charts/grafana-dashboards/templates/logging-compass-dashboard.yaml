{{- if .Values.dashboards.logging.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: logging-compass-dashboard
  namespace: {{ .Values.dashboards.logging.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  logging-compass-dashboard.json: |
{{ .Files.Get "dashboards/logging-compass-dashboard.json" | indent 4 }}
{{- end }}