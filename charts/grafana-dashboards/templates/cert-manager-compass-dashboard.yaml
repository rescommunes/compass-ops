{{- if .Values.dashboards.certManager.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-compass-dashboard
  namespace: {{ .Values.dashboards.certManager.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  cert-manager-compass-dashboard.json: |
{{ .Files.Get "dashboards/cert-manager-compass-dashboard.json" | indent 4 }}
{{- end }}